name: Generate Linked Data Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java & Python
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      # Valideer beide Turtle bestanden in de ontology map
      - name: Validate Turtle Syntax
        run: |
          pip install rdflib
          python -c "from rdflib import Graph; g=Graph(); g.parse('ontology/schema_ext-oorlogsbronnen.ttl', format='turtle'); g.parse('ontology/shapes.ttl', format='turtle'); print('Ontology & Shapes Valid!')"

      - name: Create external directory
        run: mkdir -p external

      - name: Fetch Latest External Schemas
        run: |
          curl -L http://schema.org/docs/schemaorg.ttl -o external/schema.ttl
          curl -L https://purl.org/dc/terms.ttl -o external/dcterms.ttl

      - name: Download Latest Widoco
        run: |
          WIDOCO_URL=$(curl -s https://api.github.com/repos/dgarijo/Widoco/releases/latest | grep "browser_download_url.*jar" | cut -d '"' -f 4 | head -n 1)
          wget $WIDOCO_URL -O widoco.jar

      - name: Generate Documentation
        run: |
          # 1. Voorbereiding
          mkdir -p out
          
          # 2. Samenvoegen
          grep -h "@prefix" ontology/*.ttl | sort -u > full_profile.ttl
          grep -vh "@prefix" ontology/*.ttl >> full_profile.ttl
          
          # 3. Widoco uitvoeren
          # We voegen '-lang nl' toe om het in het Nederlands te proberen als je dat hebt,
          # of we blijven bij de standaard.
          java -jar widoco.jar \
            -ontFile full_profile.ttl \
            -outFolder ./out \
            -rewriteAll \
            -webVowl \
            -getOntologyMetadata \
            -includeImportedOntologies

          # 4. FIX: Verplaats bestanden als Widoco ze in een submap 'en' of 'nl' heeft gezet
          # Soms maakt Widoco ./out/en/index.html aan. We halen alles naar ./out/
          if [ -d "./out/en" ]; then
            cp -r ./out/en/* ./out/
          elif [ -d "./out/nl" ]; then
            cp -r ./out/nl/* ./out/
          fi

          # 5. Kopieer de context file en het volledige ttl bestand:
          cp full_profile.ttl out/full_profile.ttl
          if [ -f context/context.jsonld ]; then
            cp context/context.jsonld out/context.jsonld
          fi

          # 6. Check of er een index file is (we accepteren nu ook index-en.html etc)
          # We hernoemen de belangrijkste naar index.html voor GitHub Pages
          if [ -f ./out/index-en.html ]; then cp ./out/index-en.html ./out/index.html; fi
          if [ -f ./out/index-nl.html ]; then cp ./out/index-nl.html ./out/index.html; fi

          if [ ! -f ./out/index.html ]; then
            echo "Bestanden in de out map:"
            ls -R ./out
            echo "Fout: Geen index.html gevonden na verplaatsen."
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out # We pakken de inhoud van 'out'
          branch: gh-pages # En zetten dit in de root van de gh-pages branch
