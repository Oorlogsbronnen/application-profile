name: Generate Linked Data Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java & Python
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      # Valideer beide Turtle bestanden in de ontology map
      - name: Validate Turtle Syntax
        run: |
          pip install rdflib
          python -c "from rdflib import Graph; g=Graph(); g.parse('ontology/schema_ext-oorlogsbronnen.ttl', format='turtle'); g.parse('ontology/shapes.ttl', format='turtle'); print('Ontology & Shapes Valid!')"

      - name: Create external directory
        run: mkdir -p external

      - name: Fetch Latest External Schemas
        run: |
          curl -L http://schema.org/docs/schemaorg.ttl -o external/schema.ttl
          curl -L https://purl.org/dc/terms.ttl -o external/dcterms.ttl

      - name: Download Latest Widoco
        run: |
          WIDOCO_URL=$(curl -s https://api.github.com/repos/dgarijo/Widoco/releases/latest | grep "browser_download_url.*jar" | cut -d '"' -f 4 | head -n 1)
          wget $WIDOCO_URL -O widoco.jar

      - name: Generate Documentation (with Deep Debug)
        run: |
          # 1. Voorbereiding mappen
          mkdir -p out
          
          # 2. Samenvoegen en controleren
          echo "--- Prefixes verzamelen ---"
          grep -h "@prefix" ontology/*.ttl | sort -u > full_profile.ttl
          echo "--- Inhoud toevoegen ---"
          grep -vh "@prefix" ontology/*.ttl >> full_profile.ttl
          
          # DEBUG: Laat de eerste 20 regels van het resultaat zien in de logs
          echo "--- Preview van full_profile.ttl ---"
          head -n 20 full_profile.ttl
          
          # 3. Widoco uitvoeren met volledige logging
          echo "--- Widoco Start ---"
          java -jar widoco.jar \
            -ontFile full_profile.ttl \
            -outFolder ./out \
            -rewriteAll \
            -webVowl \
            -includeImported \
            -verbose > widoco_output.log 2>&1 || echo "Widoco is gestopt met een error code."

          # 4. DEBUG: Altijd de widoco logs tonen, ook bij falen
          echo "--- Widoco Logs ---"
          cat widoco_output.log

          # 5. Kopieer de context file (indien aanwezig)
          if [ -f context/context.jsonld ]; then
            cp context/context.jsonld out/context.jsonld
          fi

          # 6. De ultieme check
          if [ ! -f ./out/index.html ]; then
            echo "CRITISCHE FOUT: Geen index.html gevonden in ./out"
            echo "Controleer hierboven de 'Widoco Logs' sectie op 'SEVERE' of 'Exception'."
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out # We pakken de inhoud van 'out'
          branch: gh-pages # En zetten dit in de root van de gh-pages branch
