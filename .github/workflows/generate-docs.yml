name: Generate Linked Data Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create external directory
        run: mkdir -p external

      - name: Fetch Latest External Schemas
        run: |
          # Haal schema.org en Dublin Core op voor lokale verwerking
          curl -L https://schema.org/docs/schemaorg.ttl -o external/schema.ttl
          curl -L https://purl.org/dc/terms.ttl -o external/dcterms.ttl

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Download Widoco
        run: |
          wget https://github.com/dgarijo/Widoco/releases/download/v1.4.25/widoco-1.4.25-jar-with-dependencies-all.jar -O widoco.jar

      - name: Generate Documentation
        run: |
          # We voegen de map 'external' toe aan de input zodat Widoco de definities kent
          java -jar widoco.jar \
            -ontFile ./schema_ext-oorlogsbronnen.ttl \
            -outFolder ./docs \
            -rewriteAll \
            -webVowl \
            -includeImported
            # Tip: Als Widoco de externe bestanden niet automatisch oppakt, 
            # kun je ze mergen in een tijdelijk bestand voor de build.

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
