name: Generate Linked Data Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java & Python
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      # Valideer beide Turtle bestanden in de ontology map
      - name: Validate Turtle Syntax
        run: |
          pip install rdflib
          python -c "from rdflib import Graph; g=Graph(); g.parse('ontology/schema_ext-oorlogsbronnen.ttl', format='turtle'); g.parse('ontology/shapes.ttl', format='turtle'); print('Ontology & Shapes Valid!')"

      - name: Create external directory
        run: mkdir -p external

      - name: Fetch Latest External Schemas
        run: |
          curl -L http://schema.org/docs/schemaorg.ttl -o external/schema.ttl
          curl -L https://purl.org/dc/terms.ttl -o external/dcterms.ttl

      - name: Download Latest Widoco
        run: |
          WIDOCO_URL=$(curl -s https://api.github.com/repos/dgarijo/Widoco/releases/latest | grep "browser_download_url.*jar" | cut -d '"' -f 4 | head -n 1)
          wget $WIDOCO_URL -O widoco.jar

      - name: Generate Documentation
        run: |
          # 1. Maak de output map handmatig aan
          mkdir -p out
          
          # 2. Voeg de bestanden samen
          cat ontology/schema_ext-oorlogsbronnen.ttl ontology/shapes.ttl > full_profile.ttl
          
          # 3. Widoco uitvoeren met extra logging (-verbose)
          # We gebruiken '|| true' om te voorkomen dat de workflow stopt bij kleine waarschuwingen,
          # maar we checken daarna of er echt iets is gegenereerd.
          java -jar widoco.jar \
            -ontFile full_profile.ttl \
            -outFolder ./out \
            -rewriteAll \
            -webVowl \
            -includeImported \
            -verbose || echo "Widoco had some warnings but continuing..."

          # 4. Check of er daadwerkelijk een index.html is gemaakt
          if [ ! -f ./out/index.html ]; then
            echo "Error: Widoco failed to generate index.html!"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out # We pakken de inhoud van 'out'
          branch: gh-pages # En zetten dit in de root van de gh-pages branch
