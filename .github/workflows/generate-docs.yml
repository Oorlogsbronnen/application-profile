name: Generate Linked Data Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java & Python
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      # We valideren de Turtle syntax met een simpele python check ipv een externe action
      - name: Validate Turtle Syntax
        run: |
          pip install rdflib
          python -c "from rdflib import Graph; Graph().parse('./ontology/schema_ext-oorlogsbronnen.ttl', format='turtle'); print('TTL Valid!')"

      - name: Create external directory
        run: mkdir -p external

      - name: Fetch Latest External Schemas
        run: |
          curl -L http://schema.org/docs/schemaorg.ttl -o schemas/schema.ttl
          curl -L https://purl.org/dc/terms.ttl -o schemas/dcterms.ttl

      - name: Download Latest Widoco
        run: |
          # Haalt de download URL van de allerlaatste release op via de GitHub API
          WIDOCO_URL=$(curl -s https://api.github.com/repos/dgarijo/Widoco/releases/latest | grep "browser_download_url.*jar" | cut -d '"' -f 4 | head -n 1)
          wget $WIDOCO_URL -O widoco.jar

      - name: Generate Documentation
        run: |
          # Let op: ik heb de bestandsnaam aangepast aan je upload
          java -jar widoco.jar \
            -ontFile "./ontology/schema_ext-oorlogsbronnen.ttl" \
            -outFolder ./docs \
            -rewriteAll \
            -webVowl \
            -includeImported

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
