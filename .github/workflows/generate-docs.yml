name: Generate Linked Data Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java & Python
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install Python Dependencies
        run: pip install rdflib

      # STAP 1: De bestanden technisch correct samenvoegen
      - name: Merge TTL Files Properly
        run: |
          python -c "
          from rdflib import Graph
          g = Graph()
          g.parse('ontology/schema_ext-oorlogsbronnen.ttl', format='turtle')
          g.parse('ontology/shapes.ttl', format='turtle')
          g.serialize(destination='full_profile.ttl', format='turtle')
          print('Merge succesvol: full_profile.ttl aangemaakt.')
          "

      - name: Download Latest Widoco
        run: |
          # Gebruik de GitHub CLI om de download URL direct te pakken
          WIDOCO_URL=$(gh release view --repo dgarijo/Widoco --json assets --jq '.assets[] | select(.name | endswith(".jar")) | .url' | head -n 1)
          echo "Downloading from: $WIDOCO_URL"
          wget "$WIDOCO_URL" -O widoco.jar
        env:
          GH_TOKEN: ${{ github.token }}

      # STAP 2: Documentatie genereren op basis van het samengevoegde bestand
      - name: Generate Documentation
        run: |
          mkdir -p out
          java -jar widoco.jar \
            -ontFile full_profile.ttl \
            -outFolder ./out \
            -rewriteAll \
            -webVowl \
            -getOntologyMetadata \
            # -includeImportedOntologies \
            -lang nl-en

          # ... rest van je verplaats-logica (index.html fix etc.) ...

          # 4. FIX: Verplaats bestanden als Widoco ze in een submap 'en' of 'nl' heeft gezet
          # Soms maakt Widoco ./out/en/index.html aan. We halen alles naar ./out/
          if [ -d "./out/en" ]; then
            cp -r ./out/en/* ./out/
          elif [ -d "./out/nl" ]; then
            cp -r ./out/nl/* ./out/
          fi

          # 5. Kopieer de context file en het volledige ttl bestand:
          cp full_profile.ttl out/full_profile.ttl
          if [ -f context/context.jsonld ]; then
            cp context/context.jsonld out/context.jsonld
          fi

          # 6. Check of er een index file is (we accepteren nu ook index-en.html etc)
          # We hernoemen de belangrijkste naar index.html voor GitHub Pages
          if [ -f ./out/index-en.html ]; then cp ./out/index-en.html ./out/index.html; fi
          if [ -f ./out/index-nl.html ]; then cp ./out/index-nl.html ./out/index.html; fi

          if [ ! -f ./out/index.html ]; then
            echo "Bestanden in de out map:"
            ls -R ./out
            echo "Fout: Geen index.html gevonden na verplaatsen."
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out # We pakken de inhoud van 'out'
          branch: gh-pages # En zetten dit in de root van de gh-pages branch
